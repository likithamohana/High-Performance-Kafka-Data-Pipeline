## Optimization Highlights
1. **GOMAXPROCS=3**: Ensures the Go app doesn't starve the Kafka broker of CPU cycles.
2. **GOGC=50**: Keeps the heap small by triggering garbage collection more aggressively.
3. **External Sort**: Reduces active memory footprint by treating local storage as temporary RAM.
