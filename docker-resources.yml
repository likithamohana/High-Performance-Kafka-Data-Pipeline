# Docker Resource Utilization Summary

This document summarizes the hardware resources required to run the Kafka Sort Pipeline at scale (50M records).

## Resource Configuration
- **CPU Allocation**: 4 Cores (Dedicated to the `app` container)
- **Memory Allocation**: 2.0 GB (Total budget for Zookeeper, Kafka, and Go App)
- **Storage**: SSD recommended for fast disk spilling

